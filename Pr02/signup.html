<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign Up</title>
        <link rel="stylesheet" href="styles/signup-style.css" />
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    </head>
    <body>
        <div class="signup-container">
            <div class="signup-box">
                <h1 class="pixel-title">CREATE ACCOUNT</h1>
                <form>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required />
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required />
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm-password"
                            placeholder="Confirm your password"
                            required
                        />
                    </div>

                    <div class="form-group terms">
                        <label class="checkbox">
                            <input type="checkbox" name="terms" required />
                            I agree to the <a href="#" class="terms-link">Terms and Conditions</a>
                        </label>
                    </div>

                    <button type="submit" class="signup-btn">Sign Up</button>
                </form>

                <div class="login-link">Already have an account? <a href="login.html">Login here</a></div>
            </div>
        </div>

        <script type="module">
            import signup from './js/auth/signup.js';
            const signupForm = document.querySelector('form');
            signupForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (password !== confirmPassword) {
                    alert('Passwords do not match!');
                    return;
                }

                try {
                    await signup(username, password, email);
                    location.href = '/';
                } catch (error) {
                    alert('Error creating account: ' + error.message);
                }
            });
        </script>
    </body>
</html>
